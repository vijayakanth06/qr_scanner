name: Release - Build APKs

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_apks:
    name: Build Universal APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/attendance-universal-${{ inputs.version || github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: dist/

  publish_release:
    name: Publish GitHub Release
    needs: build_apks
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            ## Release ${{ github.ref_name }}

            ### Universal APK
            One APK works for all colleges - college is selected on first launch.
            | File |
            |---|
            | attendance-universal-${{ inputs.version || github.ref_name }}.apk |

            ### How to install
            Download the APK and install via:
            `adb install attendance-universal-${{ github.ref_name }}.apk`
            or share directly with device administrators.
